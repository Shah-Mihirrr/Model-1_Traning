<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Strips</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
        
        table {
            width: 100%;
            max-width: 800px;
            margin: 30px auto;
            border-collapse: collapse;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        th {
            background-color: #333;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        tr.white {
            background-color: #ffffff;
        }
        
        tr.grey {
            background-color: #e8e8e8;
        }
        
       
    </style>
</head>
<body>
    <h1>Zebra Striped Table</h1>
    
    <table id="dataTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>John Doe</td>
                <td>john@example.com</td>
                <td>Sales</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Jane Smith</td>
                <td>jane@example.com</td>
                <td>Marketing</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Mike Johnson</td>
                <td>mike@example.com</td>
                <td>IT</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Sarah Williams</td>
                <td>sarah@example.com</td>
                <td>HR</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Tom Brown</td>
                <td>tom@example.com</td>
                <td>Finance</td>
            </tr>
        </tbody>
    </table>
    
    
    <script>
        $(document).ready(function() {
            $('#dataTable tbody tr').each(function(index) {
                if (index % 2 === 0) {
                    $(this).addClass('white');
                } else {
                    $(this).addClass('grey');
                }
            });
        });
    </script>
</body>
</html>
