<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Div </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 30px 0;
        }

        .box {
            width: 300px;
            height: 300px;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            background-color: #e8f4f8;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .box h2 {
            margin-top: 0;
            color: #333;
            font-size: 18px;
        }

        .movable-div {
            width: 100px;
            height: 100px;
            background-color: #ff6b6b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: move;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .movable-div:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }

        .button-container {
            text-align: center;
            margin: 20px 0;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <h1>Move Div Between Containers</h1>

    <div class="container">
        <div class="box" id="box1">
            <h2>Box 1</h2>
            <div class="movable-div" id="movable">Move Me</div>
        </div>

        <div class="box" id="box2">
            <h2>Box 2</h2>
        </div>
    </div>

    <div class="button-container">
        <button id="moveBtn">Move Div</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            let isInBox1 = true;

            $('#moveBtn').click(function() {
                if (isInBox1) {
                    // Move from box1 to box2
                    $('#movable').appendTo('#box2');
                    $(this).text('Move Back to Box 1');
                    isInBox1 = false;
                } else {
                    // Move from box2 to box1
                    $('#movable').appendTo('#box1');
                    $(this).text('Move Div');
                    isInBox1 = true;
                }
            });
        });
    </script>
</body>
</html>
