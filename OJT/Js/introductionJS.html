<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to JavaScript</title>
</head>
<body>
    <h1>Introduction to JavaScript</h1>
    <h4> Popup Boxes in JS</h4>
    <button id="alertt">Click Me to get an Alert</button><br><br>
     <button id="confirm">Click Me to get a Confirmation</button><br><br>
      <button id="prompt">Click Me to get a Prompt</button>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo"></p>

    <script>
        document.getElementById("alertt").addEventListener("click", function() {
            alert("Welcome to JavaScript!");
        });

        document.getElementById("confirm").addEventListener("click", function() {
            var result = confirm("Do you want to continue?");
            if (result) {
               alert("You clicked OK!");
            } else {
               // User clicked Cancel
            }
        });
        document.getElementById("prompt").addEventListener("click", function() {
            var result = prompt("Enter your name:");
            if (result !== null) {
              alert("Hello, " + result + "!");
            }
        });

        var x = 5;
        var y = 10;
        var z = x+y;
        document.getElementById("demo1").innerHTML = "x=" + x;
        document.getElementById("demo2").innerHTML = "y=" + y;
        document.getElementById("demo").innerHTML = "The sum of x and y is: " + z;
        document.write("Thank You💕");
    </script>
    
</body>
</html>
