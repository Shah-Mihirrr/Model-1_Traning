<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Row</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        table {
            width: 100%;
            max-width: 900px;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th {
            background-color: #333;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }


        .delete-btn:active {
            transform: scale(0.95);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Table with Delete Row Function</h1>

    <table id="dataTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Position</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Alice Johnson</td>
                <td>alice@example.com</td>
                <td>Developer</td>
                <td><button class="delete-btn">Delete</button></td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bob Smith</td>
                <td>bob@example.com</td>
                <td>Designer</td>
                <td><button class="delete-btn">Delete</button></td>
            </tr>
            <tr>
                <td>3</td>
                <td>Carol White</td>
                <td>carol@example.com</td>
                <td>Manager</td>
                <td><button class="delete-btn">Delete</button></td>
            </tr>
            <tr>
                <td>4</td>
                <td>David Brown</td>
                <td>david@example.com</td>
                <td>Tester</td>
                <td><button class="delete-btn">Delete</button></td>
            </tr>
            <tr>
                <td>5</td>
                <td>Eve Davis</td>
                <td>eve@example.com</td>
                <td>Admin</td>
                <td><button class="delete-btn">Delete</button></td>
            </tr>
        </tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.delete-btn').click(function() {
                $(this).closest('tr').fadeOut(300, function() {
                    $(this).remove();
                });
            });
        });
    </script>
</body>
</html>
