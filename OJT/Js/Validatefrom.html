<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation of form</title>
    <style>
        *{
            background-color: beige;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    .container {
        background-color: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 2px solid #000000;
            border-radius: 5px;
            box-shadow: #000000 5px 5px 10px;
           
        }
        
        form {
            max-width: 400px;
            margin: 20px auto;
            padding: 27px;
            border: 2px solid #000000;
            border-radius: 10px;
            box-shadow: #000000 3px 3px 5px;
            
        }

        input[type="text"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            display: inline-block;
            border: 2px solid #000000;
            box-sizing: border-box;
            background-color: w;
            
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: 2px solid #19551b;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: #19551b 2px 2px 5px;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        
        }
    </style>
</head>

<body>
    <div class="container">
        <h1  style="text-align: center; margin: 15px; padding: 20px; background-color: blue; border-radius: 10px;
                    border: 2px solid #000000; box-shadow: #000000 3px 3px 5px; color: white; font-family: 'Times New Roman', Times, serif;">
                    Validation of form</h1>

        <form name="myForm" style="background-color:lightblue; " onsubmit="return validateForm() ">
            Name: <input type="text" name="fname" style="background-color: white;" ><br><br>
            Email: <input type="text" name="email" style="background-color: white;" ><br><br>
            Phone: <input type="number" name="phone" style="background-color: white;" ><br><br>
            Password: <input type="password" name="password" style="background-color: white;" ><br><br>
            Confirm Password: <input type="password" name="confirm_password" style="background-color: white;" ><br><br>
            <input type="submit" value="Submit">
        </form>
       
    </div>
    <script>
        function validateForm() {
            var name = document.forms["myForm"]["fname"].value;
            var email = document.forms["myForm"]["email"].value;
            if (name == "") {
                alert("Name must be filled out");
                return false;
            }
            if (email == "") {
                alert("Email must be filled out");
                return false;
            }

            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address");
                return false;
            }

            if (isNaN(document.forms["myForm"]["phone"].value)) {
                alert("Phone number must be a number");
                return false;
            }
            if (document.forms["myForm"]["password"].value != document.forms["myForm"]["confirm_password"].value) {
                alert("Passwords do not match");
                return false;
            }
            if (document.forms["myForm"]["password"].value.length < 6) {
                alert("Password must be at least 6 characters long");
                return false;
            }
            if (document.forms["myForm"]["confirm_password"].value.length < 6) {
                alert("Password must be at least 6 characters long");
                return false;
            }
            if (document.forms["myForm"]["phone"].value.length != 10) {
                alert("Phone number must be 10 digits long");
                return false;
            }

            return true;
        }
    </script>
</body>

</html>
