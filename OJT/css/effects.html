<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effects</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


    <style>
        img {
            transition: transform 0.5s ease-in-out;
            margin-left: 50px;
        }

        img:hover {
            transform: scale(1.2);
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin-left: 50px;
            margin-top: 20px;
            background-color: #000;
            aspect-ratio: 16 / 9;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: -100px;
        }

        @media (max-width: 768px) {
            .video-container {
                width: 95%;
                margin-left: 20px;
            }
        }
    </style>
</head>

<body>
    <h1>Image Hover Effects </h1>
    <img src="WhatsApp Image 2026-03-15 at 12.49.32 (1).jpeg" width="300" height="200">
    <h1>Video Effects</h1>
    <div class="video-container">
        <video controls>
            <source src="Screen Recording 2026-04-18 234652.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    

    <i class="fa-solid fa-at"></i>
</body>

</html>
