<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .chess-container {
            background-color: #8B4513;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            gap: 0;
            border: 2px solid #654321;
            background-color: #fff;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .square:hover {
            background-color: rgba(255, 255, 0, 0.3);
        }

        .white {
            background-color: #f0d9b5;
        }

        .black {
            background-color: #b58863;
        }

        .piece {
            user-select: none;
        }

        /* Chess piece Unicode characters */
        .rook-white::before { content: "♖"; }
        .knight-white::before { content: "♘"; }
        .bishop-white::before { content: "♗"; }
        .queen-white::before { content: "♕"; }
        .king-white::before { content: "♔"; }
        .pawn-white::before { content: "♙"; }

        .rook-black::before { content: "♜"; }
        .knight-black::before { content: "♞"; }
        .bishop-black::before { content: "♝"; }
        .queen-black::before { content: "♛"; }
        .king-black::before { content: "♚"; }
        .pawn-black::before { content: "♟"; }

        .coordinates {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: #fff;
            font-weight: bold;
        }

        .files {
            display: flex;
            width: 480px;
            justify-content: space-around;
        }

        .ranks {
            display: flex;
            flex-direction: column;
            height: 480px;
            justify-content: space-around;
            margin-right: 10px;
        }

        .game-info {
            text-align: center;
            color: #fff;
            margin-top: 20px;
        }

        .game-info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="chess-container">
        <h1>Chess Game</h1>

        <div class="coordinates">
            <div class="ranks">
                <span>8</span>
                <span>7</span>
                <span>6</span>
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
            </div>

            <div class="chess-board">
                <!-- Row 8 (Black's back rank) -->
                <div class="square black"><span class="piece rook-black"></span></div>
                <div class="square white"><span class="piece knight-black"></span></div>
                <div class="square black"><span class="piece bishop-black"></span></div>
                <div class="square white"><span class="piece queen-black"></span></div>
                <div class="square black"><span class="piece king-black"></span></div>
                <div class="square white"><span class="piece bishop-black"></span></div>
                <div class="square black"><span class="piece knight-black"></span></div>
                <div class="square white"><span class="piece rook-black"></span></div>

                <!-- Row 7 (Black's pawns) -->
                <div class="square white"><span class="piece pawn-black"></span></div>
                <div class="square black"><span class="piece pawn-black"></span></div>
                <div class="square white"><span class="piece pawn-black"></span></div>
                <div class="square black"><span class="piece pawn-black"></span></div>
                <div class="square white"><span class="piece pawn-black"></span></div>
                <div class="square black"><span class="piece pawn-black"></span></div>
                <div class="square white"><span class="piece pawn-black"></span></div>
                <div class="square black"><span class="piece pawn-black"></span></div>

                <!-- Row 6 (Empty) -->
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>

                <!-- Row 5 (Empty) -->
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>

                <!-- Row 4 (Empty) -->
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>

                <!-- Row 3 (Empty) -->
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>
                <div class="square white"></div>
                <div class="square black"></div>

                <!-- Row 2 (White's pawns) -->
                <div class="square black"><span class="piece pawn-white"></span></div>
                <div class="square white"><span class="piece pawn-white"></span></div>
                <div class="square black"><span class="piece pawn-white"></span></div>
                <div class="square white"><span class="piece pawn-white"></span></div>
                <div class="square black"><span class="piece pawn-white"></span></div>
                <div class="square white"><span class="piece pawn-white"></span></div>
                <div class="square black"><span class="piece pawn-white"></span></div>
                <div class="square white"><span class="piece pawn-white"></span></div>

                <!-- Row 1 (White's back rank) -->
                <div class="square white"><span class="piece rook-white"></span></div>
                <div class="square black"><span class="piece knight-white"></span></div>
                <div class="square white"><span class="piece bishop-white"></span></div>
                <div class="square black"><span class="piece queen-white"></span></div>
                <div class="square white"><span class="piece king-white"></span></div>
                <div class="square black"><span class="piece bishop-white"></span></div>
                <div class="square white"><span class="piece knight-white"></span></div>
                <div class="square black"><span class="piece rook-white"></span></div>
            </div>
        </div>

        <div class="files">
            <span>a</span>
            <span>b</span>
            <span>c</span>
            <span>d</span>
            <span>e</span>
            <span>f</span>
            <span>g</span>
            <span>h</span>
        </div>

        <div class="game-info">
            <p><strong>White to move</strong></p>
            <p>Click on a piece to select it, then click on a destination square to move.</p>
            <p>Note: This is a visual representation only. Actual game logic requires JavaScript.</p>
        </div>
    </div>
</body>
</html>
