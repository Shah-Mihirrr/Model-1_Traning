<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bootstrap form</title> 
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>

             .navbar-nav {
            margin-left: 880px;
        }

        .nav-link {
            margin: 3px;
        }
         
.contact-form-container {
    flex: 1;
    background-color: #eef2ff;
    padding: 40px;
    border-radius: 8px;
}
.form-header {
    background-color: #5c7cfa;
    height: 60px;
    align-items: center;
    align-content: center;
    margin-bottom: 30px;
    border-radius: 4px;
}
.form-group {
    margin-bottom: 20px;
    font-weight: bold;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-size: 0.9rem;
}

.form-group input, 
.form-group textarea {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
    outline: none;
}

.form-group input:focus, 
.form-group textarea:focus {
    border-color: #5c7cfa;
}

.btn-send {
    width: 100%;
    padding: 12px;
    background-color: #707b8e; 
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-send:hover {
    background-color: #4a5568;
}
           </style> 
</head>
<body>
     <nav class="navbar navbar-expand-lg bg-body-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Silver Oak University</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="bootstrap.html#">Home</a>
                    <a class="nav-link" href="form.html">Registration</a>
                    <a class="nav-link" href="#">Login</a>
                    <a class="nav-link" href="#">Gallery</a>
                    <a class="nav-link" href="#">Contact US</a>
                </div>
            </div>
        </div>
    </nav>

     <div class="contact-form-container">
                <form class="contact-form">
                    <div class="form-header">
                        <h2 style="text-align: center;"><b>Registration form</b></h2>
                    </div>
                    
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" placeholder="Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile No *</label>
                        <input type="text" placeholder="Mobile" required>
                    </div>
                    <div class="form-group">
                        <label>Message *</label>
                        <textarea placeholder="Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-send">Send</button>
                </form>
            </div>

</body>
</html>
