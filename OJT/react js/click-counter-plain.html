<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Click Counter (Plain JS)</title>
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#f3f6f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:#fff; padding:24px; border-radius:12px; box-shadow:0 12px 30px rgba(15,23,42,0.08); width: min(96%, 420px); text-align:center }
    .count-btn { padding:14px 22px; border-radius:999px; border:none; background:#1d72b8; color:#fff; font-size:1rem; cursor:pointer }
    .count-btn:active { transform:translateY(1px) }
    .label { margin-bottom:12px; color:#334e68 }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Click the button below</div>
    <button id="countBtn" class="count-btn">You clicked 0 times</button>
  </div>

  <script>
    (function(){
      const btn = document.getElementById('countBtn');
      let count = 0;
      btn.addEventListener('click', () => {
        count += 1;
        btn.textContent = `You clicked ${count} ${count === 1 ? 'time' : 'times'}`;
      });
    })();
  </script>
</body>
</html>
