<html>

<head>
    <title>Tic Tac Toe</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #eef2f7;
            color: #102a43;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-shell {
            width: min(100%, 420px);
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
            padding: 24px 20px;
            text-align: center;
        }

        .game-shell h1 {
            margin: 0 0 18px;
            font-size: clamp(1.8rem, 2.5vw, 2.4rem);
        }

        .status {
            margin-bottom: 18px;
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            color: #334e68;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 0 auto;
        }

        .square {
            aspect-ratio: 1 / 1;
            min-height: 80px;
            border-radius: 18px;
            border: 3px solid #8ed4ff;
            background: #e6f7ff;
            font-size: clamp(2rem, 3vw, 3.2rem);
            font-weight: 700;
            color: #102a43;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .square:hover {
            transform: scale(1.03);
            background: #d3efff;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .button {
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background: #1d72b8;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .button:hover {
            background: #155a8a;
        }

        .winner {
            color: #006943;
        }

        .draw {
            color: #7b3dd3;
        }

        @media (max-width: 400px) {
            .square {
                min-height: 64px;
                font-size: 2rem;
            }

            .game-shell {
                padding: 18px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        function calculateWinner(squares) {
            const lines = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6],
            ];

            for (const [a, b, c] of lines) {
                if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                    return squares[a];
                }
            }

            return null;
        }

        function Square({ value, onClick }) {
            return (
                <button className="square" onClick={onClick} aria-label={`Square ${value || 'empty'}`}>
                    {value}
                </button>
            );
        }

        function Board({ squares, onClick }) {
            return (
                <div className="board">
                    {squares.map((value, index) => (
                        <Square key={index} value={value} onClick={() => onClick(index)} />
                    ))}
                </div>
            );
        }

        function Game() {
            const [squares, setSquares] = useState(Array(9).fill(null));
            const [xIsNext, setXIsNext] = useState(true);

            const winner = calculateWinner(squares);
            const isDraw = !winner && squares.every(Boolean);
            const status = winner
                ? `Winner: ${winner}`
                : isDraw
                ? 'Draw — try again'
                : `Next player: ${xIsNext ? 'X' : 'O'}`;

            function handleClick(index) {
                if (winner || squares[index]) return;
                const nextSquares = squares.slice();
                nextSquares[index] = xIsNext ? 'X' : 'O';
                setSquares(nextSquares);
                setXIsNext(!xIsNext);
            }

            function resetGame() {
                setSquares(Array(9).fill(null));
                setXIsNext(true);
            }

            return (
                <div className="game-shell">
                    <h1> Tic Tac Toe</h1>
                    <div className={`status ${winner ? 'winner' : isDraw ? 'draw' : ''}`}>{status}</div>
                    <Board squares={squares} onClick={handleClick} />
                    <div className="controls">
                        <button className="button" onClick={resetGame}>Restart</button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Game />);
    </script>
</body>

</html>
